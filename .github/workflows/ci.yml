# CI — thin caller of the org-wide reusable pipeline (bymaxone/.github).
#
# The generic library jobs (lint, typecheck, unit + e2e coverage, mutation) run
# via node-lib-ci.yml so every repo shares one definition. This library's
# no-Prisma source guard, build-output integrity across its three subpaths, and
# bundle-size budget stay here. Mutation runs only on a push to main / manual
# dispatch, never on PRs.
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: bymaxone/.github/.github/workflows/node-lib-ci.yml@v1
    with:
      run-format-check: false # no format:check script; prettier runs via lint/pre-commit
      run-build: false # build + integrity + size verified in the `verify` job below
      unit-command: pnpm test:cov:all # aggregated unit + e2e coverage (in-process, 100% gate)
      run-mutation: true
      mutation-source-globs: '^(src/)'

  verify:
    name: Verify build + size
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: bymaxone/.github/.github/actions/setup-node-pnpm@v1
      - name: Guard against @prisma/client imports
        # All storage is behind IOtpStorage / INotificationLogRepository; the
        # library must never import @prisma/client directly.
        run: pnpm check:no-prisma
      - name: Build all subpaths
        run: pnpm build
      - name: Verify build output integrity
        run: |
          for subpath in server shared react; do
            for ext in mjs cjs d.ts; do
              if [ ! -f "dist/$subpath/index.$ext" ]; then
                echo "Missing dist/$subpath/index.$ext"
                exit 1
              fi
            done
          done
          echo "All three subpaths produced ESM + CJS + .d.ts"
      - name: Bundle size budget
        run: pnpm size

  security:
    # Dependency review needs the dependency graph (public repos, or private + GHAS).
    # Gated on visibility so it starts running automatically once this repo is public.
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    uses: bymaxone/.github/.github/workflows/security.yml@v1
    with:
      fail-on-severity: high
