name: Release

# Tag-driven release. Pushing a `v*.*.*` tag kicks off the publish flow; the
# `workflow_dispatch` trigger is kept so an interrupted release can be re-run
# manually from the Actions tab when needed. This workflow never runs during
# normal development — only on a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

# A release is a destructive, shared-state operation — only one at a time.
concurrency:
  group: release
  cancel-in-progress: false

# Default to read-only at the workflow level. The publish job widens to
# `contents: write` (for the GitHub Release) and `id-token: write` (for the OIDC
# trusted publisher exchange).
permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm and create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The `npm-publish` environment gates the run behind a manual approval
    # (configured in repo Settings -> Environments). Even an accidentally pushed
    # tag cannot publish without a reviewer clicking "Approve".
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@bymax-one/nest-notification

    # Required for npm OIDC trusted publishing (`id-token: write`) and for
    # `gh release create` (`contents: write`). No `NPM_TOKEN` secret needed — the
    # publish exchanges the GitHub OIDC token for a short-lived npm credential via
    # the Trusted Publisher configured on npmjs.com.
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Don't leave the contents:write token in .git/config — publish uses
          # npm OIDC and `gh release` reads GH_TOKEN from env, so no git push
          # needs the persisted credential.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.8.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        # Guards against publishing a tag whose semver does not match the version
        # committed to package.json — a mismatch always indicates a broken
        # release and would otherwise ship the wrong metadata.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Verify (typecheck · lint · check:no-prisma · test · build)
        run: pnpm prepublishOnly

      - name: Release-shape gates (bundle size + dogfood smoke test)
        # prepublishOnly runs typecheck/lint/tests/build but NOT these two
        # release-shape gates, and this tag-driven job is the only place the
        # publish happens. Enforce them here so a tag cannot publish artifacts
        # that exceed the size budget or have a broken exports/tarball shape.
        run: |
          pnpm size
          node scripts/dogfood-smoke-test.mjs

      - name: Publish to npm with provenance
        # OIDC trusted publishing — pnpm delegates to the npm CLI, which exchanges
        # the GitHub OIDC token (`id-token: write` above) for a short-lived
        # publish credential. `--no-git-checks` is required because the CI runner
        # checks out a detached HEAD at the tag SHA.
        run: pnpm publish --provenance --no-git-checks

      - name: Extract release notes from CHANGELOG
        # Pulls the section for the current tag out of CHANGELOG.md so the GitHub
        # Release body stays in sync with the changelog. Falls back to a generic
        # pointer when the section is not found.
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # Notes are passed via env var (NOT `${{ ... }}` interpolation) so that
        # backticks, `$()`, and other shell metacharacters inside the CHANGELOG
        # cannot be evaluated by bash — a script-injection vector that would
        # otherwise let CHANGELOG content execute arbitrary commands on the runner.
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$RELEASE_NOTES"
