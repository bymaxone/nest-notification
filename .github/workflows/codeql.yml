name: CodeQL

# Runs on every push to `main`, on every PR targeting `main`, and on a weekly
# cron — the weekly schedule catches new CVEs in patterns that did not change in
# code. `workflow_dispatch` is kept for ad-hoc re-runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only at the workflow level. The analyze job widens to
# `security-events: write` only where it needs to upload SARIF.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      # Required for CodeQL to upload its findings to the Security tab.
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended adds higher-signal queries beyond the default set —
          # appropriate for a package that processes request headers, recipient
          # identifiers, and error objects on the audit hot path.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
